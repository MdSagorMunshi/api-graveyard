name: Validate Entries

on:
  pull_request:
    branches:
      - main
    paths:
      - "data/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run validator
        id: validator
        shell: bash
        run: |
          set +e
          set -o pipefail
          node scripts/validate.js | tee validation-report.txt
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment on pull request
        if: steps.validator.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('validation-report.txt', 'utf8').slice(0, 60000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Validation failed for \`data/entries.json\`.\n\n\`\`\`\n${body}\n\`\`\``
            });

      - name: Fail workflow if validation failed
        if: steps.validator.outputs.status != '0'
        run: exit 1
